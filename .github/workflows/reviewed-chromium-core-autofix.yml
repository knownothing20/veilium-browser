name: Reviewed Chromium Core Autofix

on:
  push:
    branches: [agent/reviewed-official-chromium-provider]

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reviewed-official-chromium-provider
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Apply exact package identity changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('internal/kernel/store.go')
          text = path.read_text()
          old = '''type Record struct {
\tID         string    `json:"id"`
\tName       string    `json:"name"`
\tProvider   string    `json:"provider"`
\tVersion    string    `json:"version"`
\tExecutable string    `json:"executable"`
\tSHA256     string    `json:"sha256"`
\tSizeBytes  int64     `json:"sizeBytes"`
\tStatus     string    `json:"status"`
\tImportedAt time.Time `json:"importedAt"`
\tVerifiedAt time.Time `json:"verifiedAt"`
}'''
          new = '''type Record struct {
\tID                string    `json:"id"`
\tName              string    `json:"name"`
\tProvider          string    `json:"provider"`
\tVersion           string    `json:"version"`
\tExecutable        string    `json:"executable"`
\tSHA256            string    `json:"sha256"`
\tSizeBytes         int64     `json:"sizeBytes"`
\tStatus            string    `json:"status"`
\tImportedAt        time.Time `json:"importedAt"`
\tVerifiedAt        time.Time `json:"verifiedAt"`
\tPackageRoot       string    `json:"packageRoot,omitempty"`
\tPackageTreeSHA256 string    `json:"packageTreeSha256,omitempty"`
\tPackageFileCount  int       `json:"packageFileCount,omitempty"`
\tPackageSizeBytes  int64     `json:"packageSizeBytes,omitempty"`
\tSnapshotRevision  int64     `json:"snapshotRevision,omitempty"`
\tArchiveSHA256     string    `json:"archiveSha256,omitempty"`
}'''
          if new not in text:
              if old not in text: raise SystemExit('Record marker missing')
              text = text.replace(old, new, 1)
          marker = '''\tcapabilities, err := fingerprint.For(strings.TrimSpace(request.Provider), strings.TrimSpace(request.Version))
\tif err != nil {
\t\treturn Record{}, err
\t}
'''
          replacement = marker + '''\tif capabilities.IsReviewed() {
\t\treturn Record{}, fmt.Errorf("reviewed kernel providers require the pinned package installer")
\t}
'''
          if replacement not in text:
              if marker not in text: raise SystemExit('Import marker missing')
              text = text.replace(marker, replacement, 1)
          marker = '''\tif status == StatusVerified && (digest != record.SHA256 || size != record.SizeBytes) {
\t\trecord.Status = StatusModified
\t}
'''
          replacement = marker + '''\tif record.Status == StatusVerified && record.PackageRoot != "" {
\t\tpackageStatus, packageErr := verifyPackageRecord(record, s.root)
\t\tif packageErr != nil {
\t\t\treturn Record{}, packageErr
\t\t}
\t\tif packageStatus != StatusVerified {
\t\t\trecord.Status = packageStatus
\t\t}
\t}
'''
          if replacement not in text:
              if marker not in text: raise SystemExit('Verify marker missing')
              text = text.replace(marker, replacement, 1)
          path.write_text(text)

          path = Path('internal/kernel/identity.go')
          text = path.read_text()
          if 'internal/kernelrelease' not in text:
              text = text.replace('"github.com/knownothing20/veilium-browser/internal/fingerprint"', '"github.com/knownothing20/veilium-browser/internal/fingerprint"\n\t"github.com/knownothing20/veilium-browser/internal/kernelrelease"', 1)
          old = '''\tExecutablePath        string                  `json:"executablePath"`
\tExecutableSize        int64                   `json:"executableSize"`
\tExecutableSHA256      string                  `json:"executableSha256"`
'''
          new = old + '''\tPackageRoot           string                  `json:"packageRoot,omitempty"`
\tPackageTreeSHA256     string                  `json:"packageTreeSha256,omitempty"`
\tPackageFileCount      int                     `json:"packageFileCount,omitempty"`
\tPackageSizeBytes      int64                   `json:"packageSizeBytes,omitempty"`
\tSnapshotRevision      int64                   `json:"snapshotRevision,omitempty"`
\tArchiveSHA256         string                  `json:"archiveSha256,omitempty"`
'''
          if new not in text:
              if old not in text: raise SystemExit('Identity fields marker missing')
              text = text.replace(old, new, 1)
          start = text.index('\tidentity := ProviderBinaryIdentity{')
          end = text.index('\tif !record.VerifiedAt.IsZero()', start)
          block = '''\tidentity := ProviderBinaryIdentity{
\t\tSchemaVersion: BinaryIdentitySchemaVersion, ProviderID: capabilities.Provider,
\t\tProviderRevision: capabilities.Revision, ProviderTrust: capabilities.TrustStatus,
\t\tBrowserVersion: record.Version, OperatingSystem: runtime.GOOS, Architecture: runtime.GOARCH,
\t\tExecutablePath: record.Executable, ExecutableSize: record.SizeBytes, ExecutableSHA256: record.SHA256,
\t\tPackageRoot: record.PackageRoot, PackageTreeSHA256: record.PackageTreeSHA256,
\t\tPackageFileCount: record.PackageFileCount, PackageSizeBytes: record.PackageSizeBytes,
\t\tSnapshotRevision: record.SnapshotRevision, ArchiveSHA256: record.ArchiveSHA256,
\t\tIntegrityStatus: record.Status, Provenance: "managed-local-import",
\t\tLimitations: append([]string(nil), capabilities.Limitations...),
\t}
\tif capabilities.IsReviewed() {
\t\trelease, ok := kernelrelease.MatchPackage(record.Provider, record.Version, record.SHA256, record.SizeBytes, record.PackageTreeSHA256, record.PackageFileCount, record.PackageSizeBytes)
\t\tif !ok || record.SnapshotRevision != release.SnapshotRevision || record.ArchiveSHA256 != release.ArchiveSHA256 || strings.TrimSpace(record.PackageRoot) == "" {
\t\t\treturn ProviderBinaryIdentity{}, fmt.Errorf("reviewed kernel record %q does not match the embedded package identity", record.ID)
\t\t}
\t\tidentity.Provenance = release.ArchiveURL
\t\tidentity.Reviewed = record.Status == StatusVerified && runtime.GOOS == release.Platform && runtime.GOARCH == release.Arch
\t\tif runtime.GOOS != release.Platform || runtime.GOARCH != release.Arch {
\t\t\tidentity.Limitations = append(identity.Limitations, "reviewed package trust applies only on "+release.Platform+"/"+release.Arch)
\t\t}
\t}
'''
          text = text[:start] + block + text[end:]
          path.write_text(text)
          PY
          gofmt -w internal/kernel/store.go internal/kernel/package.go internal/kernel/identity.go
      - name: Run core tests
        run: go test ./internal/kernelrelease ./internal/fingerprint ./internal/kernel
      - name: Commit scoped core changes
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add internal/kernel/store.go internal/kernel/package.go internal/kernel/identity.go
          git commit -m 'feat: manage exact reviewed Chromium packages'
          git push origin HEAD:agent/reviewed-official-chromium-provider
