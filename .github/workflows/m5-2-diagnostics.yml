name: M5.2 Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-format-diagnostics:
    name: Go format diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Capture exact Go formatting
        shell: bash
        run: |
          go version | tee go-format-diagnostics.log
          cp internal/localrecovery/restore_harness_test.go restore_harness_test.go.before
          gofmt -w internal/localrecovery/restore_harness_test.go
          git diff -- internal/localrecovery/restore_harness_test.go > gofmt.patch
          cp internal/localrecovery/restore_harness_test.go restore_harness_test.go.formatted
          cat gofmt.patch | tee -a go-format-diagnostics.log

      - name: Upload exact Go formatting
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m5-2-go-format-exact
          path: |
            go-format-diagnostics.log
            gofmt.patch
            restore_harness_test.go.before
            restore_harness_test.go.formatted
          retention-days: 1
          if-no-files-found: error
