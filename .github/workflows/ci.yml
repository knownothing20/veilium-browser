name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    name: Go quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet headless packages
        run: go vet ./cmd/... ./internal/...

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out ./cmd/... ./internal/...

      - name: Build headless packages
        run: go build ./cmd/... ./internal/...

  frontend:
    name: React typecheck, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Type check
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-ci-diagnostics
          path: |
            frontend/package-lock.json
            frontend/typecheck.log
          retention-days: 1
          if-no-files-found: warn

  windows:
    name: Windows Go tests
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit tests
        run: go test ./cmd/... ./internal/...

      - name: Cache exact reviewed Chromium archive
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\veilium-reviewed-chromium-1664436\chrome-win.zip
          key: reviewed-chromium-win64-d224019b7cbc115951b0f5dce8cf232c37244881a3eb969c010e457aa369332f

      - name: Fetch and verify exact reviewed Chromium archive
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $directory = Join-Path $env:RUNNER_TEMP 'veilium-reviewed-chromium-1664436'
          $archive = Join-Path $directory 'chrome-win.zip'
          New-Item -ItemType Directory -Path $directory -Force | Out-Null
          if (-not (Test-Path $archive)) {
            Invoke-WebRequest -Uri 'https://commondatastorage.googleapis.com/chromium-browser-snapshots/Win_x64/1664436/chrome-win.zip' -OutFile $archive -MaximumRedirection 3
          }
          $file = Get-Item $archive
          if ($file.Length -ne 343585547) { throw "Unexpected reviewed Chromium archive size: $($file.Length)" }
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          if ($hash -ne 'd224019b7cbc115951b0f5dce8cf232c37244881a3eb969c010e457aa369332f') { throw "Unexpected reviewed Chromium archive digest: $hash" }

      - name: Prepare user-local reviewed Chromium workdir
        id: reviewed_paths
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:LOCALAPPDATA)) {
            throw 'LOCALAPPDATA is required for reviewed Chromium CI staging'
          }
          $root = Join-Path $env:LOCALAPPDATA 'VeiliumCI'
          $workDir = Join-Path $root "reviewed-chromium-install-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          $result = Join-Path $env:RUNNER_TEMP 'reviewed-chromium-evidence-packet.json'
          New-Item -ItemType Directory -Path $root -Force | Out-Null
          if (Test-Path -LiteralPath $workDir) {
            Remove-Item -LiteralPath $workDir -Recurse -Force
          }
          "workdir=$workDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "result=$result" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Reviewed Chromium CI workdir: $workDir"

      - name: Install exact reviewed Chromium package
        id: reviewed_chromium
        shell: pwsh
        env:
          VEILIUM_REVIEWED_CHROMIUM_ARCHIVE: ${{ runner.temp }}\veilium-reviewed-chromium-1664436\chrome-win.zip
          VEILIUM_REVIEWED_CHROMIUM_WORKDIR: ${{ steps.reviewed_paths.outputs.workdir }}
          VEILIUM_REVIEWED_CHROMIUM_RESULT: ${{ steps.reviewed_paths.outputs.result }}
        run: |
          go test -v -run '^TestReviewedChromiumInstallForCI$' ./internal/kernelinstaller
          $packet = Get-Content $env:VEILIUM_REVIEWED_CHROMIUM_RESULT -Raw | ConvertFrom-Json
          if (-not $packet.executable -or -not (Test-Path $packet.executable)) { throw 'Reviewed Chromium installer did not produce an executable' }
          "path=$($packet.executable)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "packet=$env:VEILIUM_REVIEWED_CHROMIUM_RESULT" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "workdir=$env:VEILIUM_REVIEWED_CHROMIUM_WORKDIR" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Configure reviewed Chromium AppContainer ACLs
        shell: pwsh
        env:
          VEILIUM_CHROMIUM_BINARY: ${{ steps.reviewed_chromium.outputs.path }}
          VEILIUM_REVIEWED_CHROMIUM_WORKDIR: ${{ steps.reviewed_chromium.outputs.workdir }}
        run: |
          $ErrorActionPreference = 'Stop'
          $binary = [System.IO.Path]::GetFullPath($env:VEILIUM_CHROMIUM_BINARY)
          $workDir = [System.IO.Path]::GetFullPath($env:VEILIUM_REVIEWED_CHROMIUM_WORKDIR)
          $workPrefix = $workDir + [System.IO.Path]::DirectorySeparatorChar
          if (-not $binary.StartsWith($workPrefix, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Reviewed Chromium binary is outside the expected workdir: $binary"
          }
          $chromeWinDir = Split-Path -LiteralPath $binary -Parent
          $packageRoot = [System.IO.Path]::GetFullPath((Split-Path -LiteralPath $chromeWinDir -Parent))
          if (-not $packageRoot.StartsWith($workPrefix, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Reviewed Chromium package is outside the expected workdir: $packageRoot"
          }
          $lpacSid = [System.Security.Principal.SecurityIdentifier]::new('S-1-15-2-2')
          $rights = [System.Security.AccessControl.FileSystemRights]::ReadAndExecute
          $allow = [System.Security.AccessControl.AccessControlType]::Allow
          $inheritance = [System.Security.AccessControl.InheritanceFlags]::ContainerInherit -bor [System.Security.AccessControl.InheritanceFlags]::ObjectInherit
          $directoryRule = [System.Security.AccessControl.FileSystemAccessRule]::new(
            $lpacSid, $rights, $inheritance, [System.Security.AccessControl.PropagationFlags]::None, $allow
          )
          $rootAcl = Get-Acl -LiteralPath $packageRoot
          $rootAcl.SetAccessRule($directoryRule)
          Set-Acl -LiteralPath $packageRoot -AclObject $rootAcl
          $binaryAcl = Get-Acl -LiteralPath $binary
          $binaryAcl.SetAccessRule([System.Security.AccessControl.FileSystemAccessRule]::new($lpacSid, $rights, $allow))
          Set-Acl -LiteralPath $binary -AclObject $binaryAcl
          Write-Host "Reviewed Chromium AppContainer ACL root: $packageRoot"
          $rootRule = (Get-Acl -LiteralPath $packageRoot).Access | Where-Object {
            $_.IdentityReference.Translate([System.Security.Principal.SecurityIdentifier]).Value -eq $lpacSid.Value -and $_.AccessControlType -eq $allow
          }
          $binaryRule = (Get-Acl -LiteralPath $binary).Access | Where-Object {
            $_.IdentityReference.Translate([System.Security.Principal.SecurityIdentifier]).Value -eq $lpacSid.Value -and $_.AccessControlType -eq $allow
          }
          $rootRule | Format-List | Out-String | Write-Host
          $binaryRule | Format-List | Out-String | Write-Host
          if (-not $rootRule -or -not $binaryRule) {
            throw 'Reviewed Chromium LPAC ACL verification failed'
          }

      - name: Exercise exact reviewed identity and managed-window Evidence
        shell: pwsh
        env:
          VEILIUM_CHROMIUM_BINARY: ${{ steps.reviewed_chromium.outputs.path }}
        run: go test -v -run '^TestRealChromiumEvidenceCollector$' ./internal/evidence

      - name: Exercise exact reviewed browser Network Evidence
        shell: pwsh
        env:
          VEILIUM_CHROMIUM_BINARY: ${{ steps.reviewed_chromium.outputs.path }}
        run: go test -v -run '^TestRealChromiumNetworkEvidence$' ./internal/networkevidence

      - name: Verify reviewed package tamper fails closed
        shell: pwsh
        env:
          VEILIUM_REVIEWED_CHROMIUM_WORKDIR: ${{ steps.reviewed_chromium.outputs.workdir }}
          VEILIUM_REVIEWED_CHROMIUM_RESULT: ${{ steps.reviewed_chromium.outputs.packet }}
        run: go test -v -run '^TestReviewedChromiumPackageTamperForCI$' ./internal/kernelinstaller

      - name: Upload exact reviewed Provider evidence packet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reviewed-chromium-win64-evidence
          path: ${{ steps.reviewed_paths.outputs.result }}
          retention-days: 7
          if-no-files-found: warn

      - name: Build headless packages
        run: go build ./cmd/... ./internal/...

      - name: Cleanup exact reviewed Chromium install
        if: always()
        shell: pwsh
        env:
          VEILIUM_REVIEWED_CHROMIUM_WORKDIR: ${{ steps.reviewed_paths.outputs.workdir }}
        run: |
          $ErrorActionPreference = 'Stop'
          $workDir = $env:VEILIUM_REVIEWED_CHROMIUM_WORKDIR
          if ([string]::IsNullOrWhiteSpace($workDir)) {
            exit 0
          }
          $root = [System.IO.Path]::GetFullPath((Join-Path $env:LOCALAPPDATA 'VeiliumCI'))
          $candidate = [System.IO.Path]::GetFullPath($workDir)
          $prefix = $root + [System.IO.Path]::DirectorySeparatorChar
          if (-not $candidate.StartsWith($prefix, [System.StringComparison]::OrdinalIgnoreCase)) {
            throw "Refusing to clean reviewed Chromium path outside $root"
          }
          if (Test-Path -LiteralPath $candidate) {
            Remove-Item -LiteralPath $candidate -Recurse -Force
          }

  official-adapters-linux:
    name: Official adapters Linux
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Fetch pinned official adapters
        id: adapters
        run: |
          python3 scripts/fetch_official_adapters.py \
            --platform linux \
            --arch amd64 \
            --output-dir "$RUNNER_TEMP/veilium-official-adapters"

      - name: Run official binary configuration checks
        env:
          VEILIUM_XRAY_BINARY: ${{ steps.adapters.outputs.xray_path }}
          VEILIUM_SINGBOX_BINARY: ${{ steps.adapters.outputs.sing_box_path }}
        run: go test -v -run '^TestOfficialAdapterBinaries$' ./internal/adaptervalidation

      - name: Locate hosted Chromium
        id: chromium
        shell: bash
        run: |
          chromium_path=$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || command -v chromium-browser || true)
          test -n "$chromium_path"
          echo "path=$chromium_path" >> "$GITHUB_OUTPUT"
          "$chromium_path" --version

      - name: Build static browser integration tests
        shell: bash
        run: |
          CGO_ENABLED=0 go test -c -o "$RUNNER_TEMP/veilium-evidence.test" ./internal/evidence
          CGO_ENABLED=0 go test -c -o "$RUNNER_TEMP/veilium-network-evidence.test" ./internal/networkevidence

      - name: Exercise real-browser evidence collectors in clean Linux container
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$RUNNER_TEMP/veilium-evidence.test:/tmp/veilium-evidence.test:ro" \
            -v "$RUNNER_TEMP/veilium-network-evidence.test:/tmp/veilium-network-evidence.test:ro" \
            debian:13-slim \
            bash -lc '
              set -e
              apt-get update >/dev/null
              DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends chromium ca-certificates >/dev/null
              chromium --version
              VEILIUM_CHROMIUM_BINARY=/usr/bin/chromium /tmp/veilium-evidence.test -test.v -test.run "^TestRealChromiumEvidenceCollector$"
              VEILIUM_CHROMIUM_BINARY=/usr/bin/chromium /tmp/veilium-network-evidence.test -test.v -test.run "^TestRealChromiumNetworkEvidence$"
            ' 2>&1 | tee linux-browser-evidence.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload Linux browser evidence diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-browser-evidence-diagnostics
          path: linux-browser-evidence.log
          retention-days: 1
          if-no-files-found: warn

      - name: Exercise Chromium through both official adapters
        run: |
          python3 scripts/adapter_chromium_smoke.py \
            --xray "${{ steps.adapters.outputs.xray_path }}" \
            --sing-box "${{ steps.adapters.outputs.sing_box_path }}" \
            --chromium "${{ steps.chromium.outputs.path }}"

  official-adapters-windows:
    name: Official adapters Windows
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Fetch pinned official adapters
        id: adapters
        shell: pwsh
        run: |
          python scripts/fetch_official_adapters.py `
            --platform windows `
            --arch amd64 `
            --output-dir "$env:RUNNER_TEMP\veilium-official-adapters"

      - name: Run official binary configuration checks
        shell: pwsh
        env:
          VEILIUM_XRAY_BINARY: ${{ steps.adapters.outputs.xray_path }}
          VEILIUM_SINGBOX_BINARY: ${{ steps.adapters.outputs.sing_box_path }}
        run: go test -v -run '^TestOfficialAdapterBinaries$' ./internal/adaptervalidation

  desktop-windows:
    name: Wails Windows build
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build desktop application
        shell: pwsh
        run: |
          $output = & wails build -clean -platform windows/amd64 2>&1
          $exitCode = $LASTEXITCODE
          $output | Tee-Object -FilePath wails-windows.log
          exit $exitCode

      - name: Upload Windows build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wails-windows-diagnostics
          path: wails-windows.log
          retention-days: 1
          if-no-files-found: warn

  desktop-linux:
    name: Wails Linux build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WebKit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build desktop application
        shell: bash
        run: |
          set +e
          wails build -clean -tags webkit2_41 2>&1 | tee wails-linux.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload Linux build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wails-linux-diagnostics
          path: wails-linux.log
          retention-days: 1
          if-no-files-found: warn
