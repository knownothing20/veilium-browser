name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    name: Go quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet headless packages
        run: go vet ./cmd/... ./internal/...

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out ./cmd/... ./internal/...

      - name: Build headless packages
        run: go build ./cmd/... ./internal/...

  frontend:
    name: React typecheck, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Type check
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-ci-diagnostics
          path: |
            frontend/package-lock.json
            frontend/typecheck.log
          retention-days: 1
          if-no-files-found: warn

  windows:
    name: Windows Go tests
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Unit tests
        run: go test ./cmd/... ./internal/...

      - name: Locate hosted Chrome
        id: chromium
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ProgramFiles\Google\Chrome\Application\chrome.exe",
            "${env:ProgramFiles(x86)}\Google\Chrome\Application\chrome.exe",
            "$env:LOCALAPPDATA\Google\Chrome\Application\chrome.exe"
          )
          $chrome = $candidates | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $chrome) {
            $command = Get-Command chrome.exe -ErrorAction SilentlyContinue
            if ($command) { $chrome = $command.Source }
          }
          if (-not $chrome) { throw 'Hosted Chrome was not found' }
          "path=$chrome" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          & $chrome --version

      - name: Exercise real-browser evidence collector
        shell: pwsh
        env:
          VEILIUM_CHROMIUM_BINARY: ${{ steps.chromium.outputs.path }}
        run: go test -v -run '^TestRealChromiumEvidenceCollector$' ./internal/evidence

      - name: Build headless packages
        run: go build ./cmd/... ./internal/...

  official-adapters-linux:
    name: Official adapters Linux
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Fetch pinned official adapters
        id: adapters
        run: |
          python3 scripts/fetch_official_adapters.py \
            --platform linux \
            --arch amd64 \
            --output-dir "$RUNNER_TEMP/veilium-official-adapters"

      - name: Run official binary configuration checks
        env:
          VEILIUM_XRAY_BINARY: ${{ steps.adapters.outputs.xray_path }}
          VEILIUM_SINGBOX_BINARY: ${{ steps.adapters.outputs.sing_box_path }}
        run: go test -v -run '^TestOfficialAdapterBinaries$' ./internal/adaptervalidation

      - name: Locate hosted Chromium
        id: chromium
        shell: bash
        run: |
          chromium_path=$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || command -v chromium-browser || true)
          test -n "$chromium_path"
          echo "path=$chromium_path" >> "$GITHUB_OUTPUT"
          "$chromium_path" --version

      - name: Exercise real-browser evidence collector
        env:
          VEILIUM_CHROMIUM_BINARY: ${{ steps.chromium.outputs.path }}
        run: go test -v -run '^TestRealChromiumEvidenceCollector$' ./internal/evidence

      - name: Exercise Chromium through both official adapters
        run: |
          python3 scripts/adapter_chromium_smoke.py \
            --xray "${{ steps.adapters.outputs.xray_path }}" \
            --sing-box "${{ steps.adapters.outputs.sing_box_path }}" \
            --chromium "${{ steps.chromium.outputs.path }}"

  official-adapters-windows:
    name: Official adapters Windows
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Fetch pinned official adapters
        id: adapters
        shell: pwsh
        run: |
          python scripts/fetch_official_adapters.py `
            --platform windows `
            --arch amd64 `
            --output-dir "$env:RUNNER_TEMP\veilium-official-adapters"

      - name: Run official binary configuration checks
        shell: pwsh
        env:
          VEILIUM_XRAY_BINARY: ${{ steps.adapters.outputs.xray_path }}
          VEILIUM_SINGBOX_BINARY: ${{ steps.adapters.outputs.sing_box_path }}
        run: go test -v -run '^TestOfficialAdapterBinaries$' ./internal/adaptervalidation

  desktop-windows:
    name: Wails Windows build
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build desktop application
        shell: pwsh
        run: |
          $output = & wails build -clean -platform windows/amd64 2>&1
          $exitCode = $LASTEXITCODE
          $output | Tee-Object -FilePath wails-windows.log
          exit $exitCode

      - name: Upload Windows build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wails-windows-diagnostics
          path: wails-windows.log
          retention-days: 1
          if-no-files-found: warn

  desktop-linux:
    name: Wails Linux build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WebKit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build desktop application
        shell: bash
        run: |
          set +e
          wails build -clean -tags webkit2_41 2>&1 | tee wails-linux.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload Linux build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wails-linux-diagnostics
          path: wails-linux.log
          retention-days: 1
          if-no-files-found: warn
