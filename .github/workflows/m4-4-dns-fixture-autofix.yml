name: M4.4 DNS Fixture Autofix

on:
  push:
    branches: [agent/m4-4-network-evidence]

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-4-network-evidence
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Update delegated DNS fixture
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('internal/networkevidence/contracts_test.go')
          text = path.read_text()
          old = '''\t\t\t{\n\t\t\t\tSchemaVersion: ProbeSchemaVersion, ID: "dns", Revision: 1, Kind: ProbeDelegatedDNS,\n\t\t\t\tDNSZone: "probe.example.invalid", TimeoutSeconds: 10,\n\t\t\t\tSelfHostable: true, PrivacyNote: "Records only the one-time delegated query result.",\n\t\t\t},'''
          new = '''\t\t\t{\n\t\t\t\tSchemaVersion: ProbeSchemaVersion, ID: "dns", Revision: 1, Kind: ProbeDelegatedDNS,\n\t\t\t\tDNSZone: "probe.example.invalid", DNSResultURL: "https://probe.example.invalid/dns-result",\n\t\t\t\tTimeoutSeconds: 10, MaxResponseBytes: 4096,\n\t\t\t\tSelfHostable: true, PrivacyNote: "Records only the one-time delegated query result.",\n\t\t\t},'''
          if new not in text:
              if old not in text:
                  raise SystemExit('DNS fixture marker not found')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          gofmt -w internal/networkevidence/contracts_test.go internal/networkevidence/probes.go
      - name: Test scoped package
        run: go test ./internal/networkevidence
      - name: Commit fixture update
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add internal/networkevidence/contracts_test.go internal/networkevidence/probes.go
          git commit -m 'test: add explicit delegated DNS result fixture'
          git push origin HEAD:agent/m4-4-network-evidence
