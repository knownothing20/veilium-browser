name: Reviewed Chromium Frontend Autofix

on:
  push:
    branches: [agent/reviewed-official-chromium-provider]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.ref_name == 'agent/reviewed-official-chromium-provider' || github.head_ref == 'agent/reviewed-official-chromium-provider'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reviewed-official-chromium-provider
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Add reviewed Chromium frontend integration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          p=Path('frontend/src/types.ts')
          t=p.read_text()
          marker="""  importedAt: string
  verifiedAt: string
}"""
          replacement="""  importedAt: string
  verifiedAt: string
  packageRoot?: string
  packageTreeSha256?: string
  packageFileCount?: number
  packageSizeBytes?: number
  snapshotRevision?: number
  archiveSha256?: string
}

export interface KernelReleasePin {
  providerId: string
  providerRevision: number
  name: string
  browserVersion: string
  snapshotRevision: number
  sourceProject: string
  sourcePageUrl: string
  licenseSpdx: string
  licenseUrl: string
  thirdPartyNoticesUrl: string
  reviewedAt: string
  platform: string
  arch: string
  archiveName: string
  archiveUrl: string
  archiveSizeBytes: number
  archiveSha256: string
  archiveEntryCount: number
  archiveRoot: string
  executablePath: string
  executableSizeBytes: number
  executableSha256: string
  packageFileCount: number
  expandedSizeBytes: number
  packageTreeSha256: string
  limitations: string[]
}

export interface KernelInstallRequest {
  providerId: string
  version: string
  licenseAccepted: boolean
}"""
          if 'export interface KernelReleasePin' not in t:
              if marker not in t: raise SystemExit('KernelRecord marker missing')
              t=t.replace(marker,replacement,1)
          marker="""  credentialProvider: string
  adapterPins: AdapterReleasePin[]
  runtimePlatform: string"""
          replacement="""  credentialProvider: string
  adapterPins: AdapterReleasePin[]
  kernelPins: KernelReleasePin[]
  runtimePlatform: string"""
          if 'kernelPins: KernelReleasePin[]' not in t:
              if marker not in t: raise SystemExit('Bootstrap marker missing')
              t=t.replace(marker,replacement,1)
          marker="""  executablePath: string
  executableSize: number
  executableSha256: string
  integrityStatus: string"""
          replacement="""  executablePath: string
  executableSize: number
  executableSha256: string
  packageRoot?: string
  packageTreeSha256?: string
  packageFileCount?: number
  packageSizeBytes?: number
  snapshotRevision?: number
  archiveSha256?: string
  integrityStatus: string"""
          if 'packageTreeSha256?: string' not in t[t.index('export interface ProviderBinaryIdentity'):]:
              if marker not in t: raise SystemExit('Binary identity marker missing')
              t=t.replace(marker,replacement,1)
          p.write_text(t)

          p=Path('frontend/src/lib/backend.ts')
          t=p.read_text()
          if 'KernelInstallRequest,' not in t:
              t=t.replace('  KernelImportRequest,\n','  KernelImportRequest,\n  KernelInstallRequest,\n',1)
          if 'InstallOfficialKernel:' not in t:
              t=t.replace('  ImportKernel: (request: KernelImportRequest) => Promise<KernelRecord>;\n','  ImportKernel: (request: KernelImportRequest) => Promise<KernelRecord>;\n  InstallOfficialKernel: (request: KernelInstallRequest) => Promise<KernelRecord>;\n',1)
          if 'kernelPins: []' not in t:
              t=t.replace('          adapterPins: [],\n','          adapterPins: [],\n          kernelPins: [],\n',1)
          marker='''  async verifyKernel(id: string): Promise<KernelRecord> {'''
          method='''  async installOfficialKernel(request: KernelInstallRequest): Promise<KernelRecord> {
    const api = native();
    if (!api)
      throw new Error(
        "Official Chromium installation is available only in the Wails desktop application",
      );
    return api.InstallOfficialKernel(request);
  },

'''
          if 'async installOfficialKernel' not in t:
              if marker not in t: raise SystemExit('backend verify marker missing')
              t=t.replace(marker,method+marker,1)
          p.write_text(t)

          p=Path('frontend/src/App.tsx')
          t=p.read_text()
          if "./components/OfficialKernelCard" not in t:
              t=t.replace("import { NetworkEvidenceAction } from './components/NetworkEvidenceAction'\n", "import { NetworkEvidenceAction } from './components/NetworkEvidenceAction'\nimport { OfficialKernelCard } from './components/OfficialKernelCard'\n",1)
          if 'KernelInstallRequest,' not in t:
              t=t.replace('  KernelImportRequest,\n','  KernelImportRequest,\n  KernelInstallRequest,\n',1)
          if 'kernelPins: []' not in t:
              t=t.replace("  adapterPins: [],\n", "  adapterPins: [],\n  kernelPins: [],\n",1)
          if 'kernelLicenseAccepted' not in t:
              t=t.replace("  const [kernelError, setKernelError] = useState('')\n", "  const [kernelError, setKernelError] = useState('')\n  const [kernelLicenseAccepted, setKernelLicenseAccepted] = useState(false)\n",1)
          marker='''  async function verifyKernel(record: KernelRecord)'''
          method='''  async function installOfficialKernel(request: KernelInstallRequest) {
    setKernelBusy(true)
    setKernelError('')
    try {
      await backend.installOfficialKernel(request)
      setKernelLicenseAccepted(false)
      await refresh()
    } catch (reason) {
      setKernelError(errorText(reason))
    } finally {
      setKernelBusy(false)
    }
  }

'''
          if 'async function installOfficialKernel' not in t:
              if marker not in t: raise SystemExit('App verify marker missing')
              t=t.replace(marker,method+marker,1)
          start=t.index('  function kernels() {')
          end=t.index('\n\n  const adapters =',start)
          function='''  function kernels() {
    const pin = data.kernelPins[0]
    const importProviders = data.providers.filter((item) => item.id !== pin?.providerId)
    const provider = importProviders.find((item) => item.id === kernelRequest.provider)
    return <>
      <Heading eyebrow="Verified local binaries" title="Kernel registry" description="Install one exact reviewed Chromium package or import a custom local executable." />
      <OfficialKernelCard
        pin={pin}
        records={data.kernels}
        runtimePlatform={data.runtimePlatform}
        runtimeArch={data.runtimeArch}
        nativeMode={backend.isNative()}
        busy={kernelBusy}
        accepted={kernelLicenseAccepted}
        onAcceptedChange={setKernelLicenseAccepted}
        onInstall={(request) => void installOfficialKernel(request)}
      />
      <section className="panel kernel-import">
        <div className="panel-heading"><div><h2>Register custom local Chromium</h2><p>Custom and legacy files remain unverified and cannot inherit the reviewed package claim.</p></div></div>
        <div className="kernel-import-grid">
          <label>Name<input value={kernelRequest.name} onChange={(event) => setKernelRequest((current) => ({ ...current, name: event.target.value }))} /></label>
          <label>Provider<select value={kernelRequest.provider} onChange={(event) => { const next = importProviders.find((item) => item.id === event.target.value); setKernelRequest((current) => ({ ...current, provider: event.target.value, version: next?.versions[0] || '' })) }}>{importProviders.map((item) => <option key={item.id} value={item.id}>{item.name}</option>)}</select></label>
          <label>Version<select value={kernelRequest.version} onChange={(event) => setKernelRequest((current) => ({ ...current, version: event.target.value }))}>{provider?.versions.map((version) => <option key={version}>{version}</option>)}</select></label>
          <label className="kernel-path">Executable path<div className="path-picker"><input readOnly value={kernelRequest.sourcePath} /><button type="button" className="button secondary" onClick={() => void pickKernel()} disabled={!backend.isNative()}>Browse</button></div></label>
          <button className="button primary kernel-import-button" onClick={() => void importKernel()} disabled={kernelBusy || !backend.isNative() || !kernelRequest.name.trim() || !kernelRequest.sourcePath.trim()}>{kernelBusy ? 'Working…' : 'Import and hash'}</button>
        </div>
        {kernelError && <div className="form-error">{kernelError}</div>}
      </section>
      <div className="kernel-registry-list">
        {data.kernels.length === 0 ? <Empty icon="⬡" title="No registered kernels" detail="Install the reviewed package or import a custom Chromium executable." /> : data.kernels.map((record) => <article className="kernel-record" key={record.id}>
          <div className="kernel-record-head"><div className="kernel-symbol">⬡</div><div><h2>{record.name}</h2><code>{record.provider} · Chromium {record.version}</code></div><span className={`kernel-status ${record.status}`}>{record.status}</span></div>
          <dl><div><dt>Executable SHA-256</dt><dd>{record.sha256.slice(0, 16)}…{record.sha256.slice(-8)}</dd></div>{record.packageTreeSha256 && <div><dt>Package tree</dt><dd>{record.packageFileCount} files · {record.packageTreeSha256.slice(0, 16)}…</dd></div>}<div><dt>Size</dt><dd>{(record.sizeBytes / 1024 / 1024).toFixed(1)} MB</dd></div><div><dt>Managed path</dt><dd title={record.executable}>{record.executable}</dd></div></dl>
          <div className="kernel-actions"><button className="button secondary" onClick={() => void verifyKernel(record)} disabled={kernelBusy}>Verify</button><button className="button secondary danger-text" onClick={() => void removeKernel(record)} disabled={kernelBusy}>Remove</button></div>
        </article>)}
      </div>
    </>
  }'''
          t=t[:start]+function+t[end:]
          p.write_text(t)
          PY
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend checks
        working-directory: frontend
        run: |
          npm run typecheck
          npm test -- --run
          npm run build
      - name: Commit scoped frontend changes
        if: github.event_name == 'push'
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add frontend/src/types.ts frontend/src/lib/backend.ts frontend/src/App.tsx frontend/src/components/OfficialKernelCard.tsx frontend/src/kernel.css
          git commit -m 'feat: add reviewed Chromium installer UI'
          git push origin HEAD:agent/reviewed-official-chromium-provider
