name: Reviewed Chromium Frontend Autofix

on:
  push:
    branches: [agent/reviewed-official-chromium-provider]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-and-test:
    if: github.ref_name == 'agent/reviewed-official-chromium-provider' || github.head_ref == 'agent/reviewed-official-chromium-provider'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reviewed-official-chromium-provider
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Apply reviewed Chromium frontend patch
        shell: bash
        run: |
          git apply --check .github/reviewed-chromium-frontend.patch
          git apply .github/reviewed-chromium-frontend.patch
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend checks
        working-directory: frontend
        run: |
          npm run typecheck
          npm test -- --run
          npm run build
      - name: Commit scoped frontend changes
        if: github.event_name == 'push'
        shell: bash
        run: |
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add frontend/src/types.ts frontend/src/lib/backend.ts frontend/src/App.tsx frontend/src/components/OfficialKernelCard.tsx frontend/src/kernel.css
          git commit -m 'feat: add reviewed Chromium installer UI'
          git push origin HEAD:agent/reviewed-official-chromium-provider
