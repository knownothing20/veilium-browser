name: M4 Version Sync

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'agent/m4-2-real-browser-evidence'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Synchronize application version
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('internal/desktop/service.go')
          text = path.read_text()
          old = 'const AppVersion = "0.13.0-dev"'
          new = 'const AppVersion = "0.14.0-dev"'
          if new in text:
              raise SystemExit(0)
          if old not in text:
              raise SystemExit('expected application version baseline not found')
          path.write_text(text.replace(old, new, 1))
          PY
          gofmt -w internal/desktop/service.go
      - name: Verify desktop service
        run: go test ./internal/desktop
      - name: Commit version sync
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'Version already synchronized.'
            exit 0
          fi
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add internal/desktop/service.go
          git commit -m 'chore: advance application version to 0.14.0-dev'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
