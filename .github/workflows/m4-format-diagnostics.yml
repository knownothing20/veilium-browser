name: M4 Format Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Generate desktop provider catalog patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('internal/desktop/service.go')
          text = path.read_text()
          text = text.replace('const AppVersion = "0.12.0-dev"', 'const AppVersion = "0.13.0-dev"')
          replacement = '''func providerCatalog() []ProviderDescriptor {
          	contracts := fingerprint.Definitions()
          	definitions := make([]ProviderDescriptor, 0, len(contracts))
          	for _, contract := range contracts {
          		descriptor := ProviderDescriptor{
          			ID:          contract.ID,
          			Name:        contract.Name,
          			Description: contract.Description,
          			Versions:    append([]string(nil), contract.Versions...),
          		}
          		for _, version := range descriptor.Versions {
          			capabilities, err := fingerprint.For(descriptor.ID, version)
          			if err == nil {
          				descriptor.Samples = append(descriptor.Samples, capabilities)
          			}
          		}
          		definitions = append(definitions, descriptor)
          	}
          	return definitions
          }
          '''
          text, count = re.subn(r'func providerCatalog\(\) \[\]ProviderDescriptor \{.*?\n\}', replacement.rstrip(), text, count=1, flags=re.S)
          if count != 1:
              raise SystemExit(f'expected one providerCatalog function, replaced {count}')
          path.write_text(text)
          PY
      - name: Format changed Go files
        run: |
          gofmt -w \
            internal/fingerprint/catalog.go \
            internal/fingerprint/args.go \
            internal/fingerprint/validator.go \
            internal/fingerprint/catalog_test.go \
            internal/fingerprint/validator_test.go \
            internal/fingerprint/replacement.go \
            internal/fingerprint/replacement_test.go \
            internal/kernel/identity.go \
            internal/kernel/identity_test.go \
            internal/desktop/service.go
      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: m4-formatted-go
          path: |
            internal/fingerprint/catalog.go
            internal/fingerprint/args.go
            internal/fingerprint/validator.go
            internal/fingerprint/catalog_test.go
            internal/fingerprint/validator_test.go
            internal/fingerprint/replacement.go
            internal/fingerprint/replacement_test.go
            internal/kernel/identity.go
            internal/kernel/identity_test.go
            internal/desktop/service.go
          retention-days: 1
