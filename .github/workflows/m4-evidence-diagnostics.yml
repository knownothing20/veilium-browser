name: M4 Evidence Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: List unformatted files
        shell: bash
        run: |
          gofmt -l . | tee gofmt-files.log
      - name: Run Go tests
        shell: bash
        run: |
          set +e
          go test ./cmd/... ./internal/... 2>&1 | tee go-test-linux.log
          echo ${PIPESTATUS[0]} > go-test-linux.status
          exit 0
      - name: Run Go build
        shell: bash
        run: |
          set +e
          go build ./cmd/... ./internal/... 2>&1 | tee go-build-linux.log
          echo ${PIPESTATUS[0]} > go-build-linux.status
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: m4-evidence-linux-diagnostics
          path: |
            gofmt-files.log
            go-test-linux.log
            go-test-linux.status
            go-build-linux.log
            go-build-linux.status
          retention-days: 1
          if-no-files-found: error

  diagnose-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run Windows Go tests
        shell: pwsh
        run: |
          $output = & go test ./cmd/... ./internal/... 2>&1
          $status = $LASTEXITCODE
          $output | Tee-Object -FilePath go-test-windows.log
          Set-Content -Path go-test-windows.status -Value $status
          exit 0
      - name: Run Windows Go build
        shell: pwsh
        run: |
          $output = & go build ./cmd/... ./internal/... 2>&1
          $status = $LASTEXITCODE
          $output | Tee-Object -FilePath go-build-windows.log
          Set-Content -Path go-build-windows.status -Value $status
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: m4-evidence-windows-diagnostics
          path: |
            go-test-windows.log
            go-test-windows.status
            go-build-windows.log
            go-build-windows.status
          retention-days: 1
          if-no-files-found: error
