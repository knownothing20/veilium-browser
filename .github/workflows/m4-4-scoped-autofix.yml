name: M4.4 Scoped Autofix

on:
  push:
    branches: [agent/m4-4-network-evidence]

permissions:
  contents: write

jobs:
  format-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-4-network-evidence
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Format scoped package
        run: gofmt -w internal/networkevidence
      - name: Test scoped package
        run: go test ./internal/networkevidence
      - name: Commit scoped format
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add internal/networkevidence
          git commit -m 'style: format M4.4 network evidence package'
          git push origin HEAD:agent/m4-4-network-evidence
