name: Reviewed Chromium Package Tree Discovery

on:
  push:
    branches: [agent/reviewed-official-chromium-provider]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  discover-tree:
    if: github.ref_name == 'agent/reviewed-official-chromium-provider' || github.head_ref == 'agent/reviewed-official-chromium-provider'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reviewed-official-chromium-provider
      - uses: actions/cache@v4
        with:
          path: reviewed-chromium-cache/chrome-win.zip
          key: reviewed-chromium-d224019b7cbc115951b0f5dce8cf232c37244881a3eb969c010e457aa369332f
      - name: Download and verify fixed archive
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $directory = Join-Path $PWD 'reviewed-chromium-cache'
          $archive = Join-Path $directory 'chrome-win.zip'
          New-Item -ItemType Directory -Force -Path $directory | Out-Null
          if (-not (Test-Path $archive)) {
            Invoke-WebRequest -Uri 'https://commondatastorage.googleapis.com/chromium-browser-snapshots/Win_x64/1664436/chrome-win.zip' -OutFile $archive -MaximumRedirection 3
          }
          $item = Get-Item $archive
          if ($item.Length -ne 343585547) { throw "Unexpected archive size $($item.Length)" }
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          if ($hash -ne 'd224019b7cbc115951b0f5dce8cf232c37244881a3eb969c010e457aa369332f') { throw "Unexpected archive digest $hash" }
      - name: Compute deterministic package tree identity
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $archive = Join-Path $PWD 'reviewed-chromium-cache/chrome-win.zip'
          $root = Join-Path $env:RUNNER_TEMP 'reviewed-chromium-tree'
          Expand-Archive -LiteralPath $archive -DestinationPath $root
          $files = Get-ChildItem -Path $root -Recurse -File | ForEach-Object {
            $relative = [IO.Path]::GetRelativePath($root, $_.FullName).Replace('\','/')
            [pscustomobject]@{
              Path = $relative
              Size = [int64]$_.Length
              Digest = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
            }
          } | Sort-Object Path
          if ($files.Count -ne 261) { throw "Unexpected file count $($files.Count)" }
          $builder = [Text.StringBuilder]::new()
          [int64]$expanded = 0
          foreach ($file in $files) {
            [void]$builder.Append($file.Path)
            [void]$builder.Append([char]0)
            [void]$builder.Append($file.Size)
            [void]$builder.Append([char]0)
            [void]$builder.Append($file.Digest)
            [void]$builder.Append("`n")
            $expanded += $file.Size
          }
          $bytes = [Text.Encoding]::UTF8.GetBytes($builder.ToString())
          $hasher = [Security.Cryptography.SHA256]::Create()
          $treeHash = [Convert]::ToHexString($hasher.ComputeHash($bytes)).ToLowerInvariant()
          $result = [ordered]@{
            schemaVersion = 1
            revision = 1664436
            archiveSha256 = 'd224019b7cbc115951b0f5dce8cf232c37244881a3eb969c010e457aa369332f'
            packageFileCount = $files.Count
            expandedSizeBytes = $expanded
            packageTreeSha256 = $treeHash
          }
          $result | ConvertTo-Json | Set-Content -Encoding utf8 reviewed-chromium-tree.json
          $result | ConvertTo-Json
      - uses: actions/upload-artifact@v4
        with:
          name: reviewed-chromium-tree-identity
          path: reviewed-chromium-tree.json
          retention-days: 1
          if-no-files-found: error
