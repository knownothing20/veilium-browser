name: Reviewed Chromium App Materializer

on:
  push:
    branches: [agent/reviewed-official-chromium-provider]

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reviewed-official-chromium-provider
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Materialize exact reviewed App source
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import json
          import os
          from pathlib import Path
          from urllib.request import Request, urlopen

          blob = '85830197b53364931c227e003ac79d9f8b96d06d'
          request = Request(
              f'https://api.github.com/repos/knownothing20/veilium-browser/git/blobs/{blob}',
              headers={
                  'Authorization': f'Bearer {os.environ["GITHUB_TOKEN"]}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )
          with urlopen(request, timeout=30) as response:
              payload = json.load(response)
          content = base64.b64decode(payload['content'])
          digest = hashlib.sha256(content).hexdigest()
          if digest != 'ad8a647318f72f9d89279f9169b49cfcb24a2f7a76bb768641a07ac56cfe193a':
              raise SystemExit(f'unexpected App source digest: {digest}')
          Path('frontend/src/App.tsx').write_bytes(content)
          PY
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Run frontend checks
        working-directory: frontend
        run: |
          npm run typecheck
          npm test -- --run
          npm run build
      - name: Commit final App and remove staging files
        shell: bash
        run: |
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add frontend/src/App.tsx
          git rm -f .github/workflows/reviewed-chromium-app-materialize.yml
          git rm -rf --ignore-unmatch .github/reviewed-app
          git commit -m 'feat: integrate reviewed Chromium installer workspace'
          git push origin HEAD:agent/reviewed-official-chromium-provider
