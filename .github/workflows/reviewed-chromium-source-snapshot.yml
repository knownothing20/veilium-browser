name: Reviewed Chromium Source Snapshot

on:
  push:
    branches: [agent/reviewed-official-chromium-provider]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  snapshot:
    if: github.ref_name == 'agent/reviewed-official-chromium-provider' || github.head_ref == 'agent/reviewed-official-chromium-provider'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reviewed-official-chromium-provider
      - uses: actions/upload-artifact@v4
        with:
          name: reviewed-chromium-source-snapshot
          path: |
            go.mod
            go.sum
            Makefile
            cmd
            internal
            scripts
            frontend/package.json
            frontend/package-lock.json
            frontend/tsconfig.json
            frontend/vite.config.ts
            frontend/src
            desktop_app.go
            desktop_evidence.go
            desktop_network_evidence.go
            desktop_main.go
            .github/workflows/ci.yml
            docs
          retention-days: 1
          if-no-files-found: error
