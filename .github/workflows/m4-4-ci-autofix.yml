name: M4.4 CI Autofix

on:
  push:
    branches: [agent/m4-4-network-evidence]

permissions:
  contents: write

jobs:
  update-required-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-4-network-evidence
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Add controlled network evidence checks
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/ci.yml')
          text = path.read_text()

          windows_marker = "        run: go test -v -run '^TestRealChromiumEvidenceCollector$' ./internal/evidence\n"
          windows_step = """

      - name: Exercise real-browser network evidence
        shell: pwsh
        env:
          VEILIUM_CHROMIUM_BINARY: ${{ steps.chromium.outputs.path }}
        run: go test -v -run '^TestRealChromiumNetworkEvidence$' ./internal/networkevidence
"""
          if "Exercise real-browser network evidence" not in text:
              if windows_marker not in text:
                  raise SystemExit('Windows evidence marker not found')
              text = text.replace(windows_marker, windows_marker + windows_step, 1)

          old_build = """      - name: Build static evidence integration test
        shell: bash
        run: CGO_ENABLED=0 go test -c -o "$RUNNER_TEMP/veilium-evidence.test" ./internal/evidence
"""
          new_build = """      - name: Build static browser integration tests
        shell: bash
        run: |
          CGO_ENABLED=0 go test -c -o "$RUNNER_TEMP/veilium-evidence.test" ./internal/evidence
          CGO_ENABLED=0 go test -c -o "$RUNNER_TEMP/veilium-network-evidence.test" ./internal/networkevidence
"""
          if old_build in text:
              text = text.replace(old_build, new_build, 1)

          volume_marker = '            -v "$RUNNER_TEMP/veilium-evidence.test:/tmp/veilium-evidence.test:ro" \\\n'
          network_volume = '            -v "$RUNNER_TEMP/veilium-network-evidence.test:/tmp/veilium-network-evidence.test:ro" \\\n'
          if 'veilium-network-evidence.test:/tmp/veilium-network-evidence.test' not in text:
              if volume_marker not in text:
                  raise SystemExit('Linux volume marker not found')
              text = text.replace(volume_marker, volume_marker + network_volume, 1)

          command_marker = '              VEILIUM_CHROMIUM_BINARY=/usr/bin/chromium /tmp/veilium-evidence.test -test.v -test.run "^TestRealChromiumEvidenceCollector$"\n'
          network_command = '              VEILIUM_CHROMIUM_BINARY=/usr/bin/chromium /tmp/veilium-network-evidence.test -test.v -test.run "^TestRealChromiumNetworkEvidence$"\n'
          if '/tmp/veilium-network-evidence.test -test.v' not in text:
              if command_marker not in text:
                  raise SystemExit('Linux evidence command marker not found')
              text = text.replace(command_marker, command_marker + network_command, 1)

          path.write_text(text)
          PY
          grep -q "Exercise real-browser network evidence" .github/workflows/ci.yml
          grep -q "veilium-network-evidence.test" .github/workflows/ci.yml
      - name: Validate network package
        run: go test ./internal/networkevidence
      - name: Commit Required CI update
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add .github/workflows/ci.yml
          git commit -m 'ci: require real-browser M4.4 network evidence'
          git push origin HEAD:agent/m4-4-network-evidence
