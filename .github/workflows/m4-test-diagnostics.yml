name: M4 Test Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run Go tests with diagnostics
        shell: bash
        run: |
          set +e
          go test ./cmd/... ./internal/... 2>&1 | tee go-test.log
          status=${PIPESTATUS[0]}
          exit "$status"
      - name: Upload Go test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-go-test-diagnostics
          path: go-test.log
          retention-days: 1
          if-no-files-found: error
