name: M4.3 Window Integration

on:
  push:
    branches: [agent/m4-3-identity-window-consistency]

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-3-identity-window-consistency
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Apply audited window lifecycle integration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          service = Path('internal/desktop/service.go')
          text = service.read_text()
          replacements = [
              (
                  '''\tif !route.RequiresBridge {\n\t\treturn s.supervisor.Start(ctx, item.ID, item.Name, func(port int) (domain.LaunchPlan, error) {\n\t\t\treturn s.planner.Build(item, port)\n\t\t})\n\t}''',
                  '''\tif !route.RequiresBridge {\n\t\tsession, startErr := s.supervisor.Start(ctx, item.ID, item.Name, func(port int) (domain.LaunchPlan, error) {\n\t\t\treturn s.planner.Build(item, port)\n\t\t})\n\t\tif startErr != nil {\n\t\t\treturn session, startErr\n\t\t}\n\t\treturn s.applyManagedWindow(ctx, item, session)\n\t}''',
              ),
              (
                  '''\t\tif browserErr != nil {\n\t\t\t_ = instance.Close()\n\t\t\treturn session, browserErr\n\t\t}\n\t\ttoken := registerNetworkRuntime(s, item.ID, instance)''',
                  '''\t\tif browserErr != nil {\n\t\t\t_ = instance.Close()\n\t\t\treturn session, browserErr\n\t\t}\n\t\tsession, windowErr := s.applyManagedWindow(ctx, item, session)\n\t\tif windowErr != nil {\n\t\t\t_ = instance.Close()\n\t\t\treturn session, windowErr\n\t\t}\n\t\ttoken := registerNetworkRuntime(s, item.ID, instance)''',
              ),
              (
                  '''\tif err != nil {\n\t\t_ = bridge.Close()\n\t\treturn session, err\n\t}\n\ttoken := registerNetworkRuntime(s, item.ID, bridge)''',
                  '''\tif err != nil {\n\t\t_ = bridge.Close()\n\t\treturn session, err\n\t}\n\tsession, windowErr := s.applyManagedWindow(ctx, item, session)\n\tif windowErr != nil {\n\t\t_ = bridge.Close()\n\t\treturn session, windowErr\n\t}\n\ttoken := registerNetworkRuntime(s, item.ID, bridge)''',
              ),
              (
                  '''func (s *Service) StopProfile(ctx context.Context, profileID string) (supervisor.Session, error) {\n\tsession, runtimeErr := s.supervisor.Stop(ctx, profileID)''',
                  '''func (s *Service) StopProfile(ctx context.Context, profileID string) (supervisor.Session, error) {\n\tsession, runtimeErr := s.supervisor.Stop(ctx, profileID)\n\tclearObservedWindow(s, profileID)''',
              ),
          ]
          for old, new in replacements:
              if new in text:
                  continue
              if old not in text:
                  raise SystemExit('window integration marker not found')
              text = text.replace(old, new, 1)
          service.write_text(text)

          bridges = Path('internal/desktop/runtime_bridges.go')
          text = bridges.read_text()
          old = '''func shutdownRuntimeAndBridges(service *Service, ctx context.Context) error {\n\truntimeErr := service.supervisor.Shutdown(ctx)'''
          new = '''func shutdownRuntimeAndBridges(service *Service, ctx context.Context) error {\n\tclearAllObservedWindows(service)\n\truntimeErr := service.supervisor.Shutdown(ctx)'''
          if new not in text:
              if old not in text:
                  raise SystemExit('shutdown window marker not found')
              text = text.replace(old, new, 1)
          bridges.write_text(text)
          PY
      - name: Format scoped files
        run: |
          gofmt -w \
            internal/desktop/service.go \
            internal/desktop/runtime_bridges.go \
            internal/desktop/window.go \
            internal/desktop/consistency.go \
            internal/desktop/consistency_test.go \
            internal/windowcontrol/*.go \
            desktop_evidence.go
      - name: Run scoped tests
        run: go test ./internal/windowcontrol ./internal/desktop ./internal/supervisor ./internal/consistency ./internal/evidence ./internal/launch ./internal/fingerprint
      - name: Commit scoped integration
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            internal/desktop/service.go \
            internal/desktop/runtime_bridges.go \
            internal/desktop/window.go \
            internal/desktop/consistency.go \
            internal/desktop/consistency_test.go \
            internal/windowcontrol \
            desktop_evidence.go
          git commit -m 'feat: apply managed browser window through bounded CDP'
          git push origin HEAD:agent/m4-3-identity-window-consistency
