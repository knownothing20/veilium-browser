name: M4.4 Code Autofix

on:
  push:
    branches: [agent/m4-4-network-evidence]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-and-test:
    if: github.ref_name == 'agent/m4-4-network-evidence' || github.head_ref == 'agent/m4-4-network-evidence'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-4-network-evidence
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply scoped code fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          collector = Path('internal/networkevidence/collector.go')
          text = collector.read_text().replace('"https://* ."+zone', '"https://*."+zone')
          collector.write_text(text)

          browser_test = Path('internal/networkevidence/browser_integration_test.go')
          text = browser_test.read_text().replace(
              'Client: &http.Client{Timeout: 2 * time.Second}',
              'Client: &http.Client{Timeout: 2 * time.Second, Transport: &http.Transport{Proxy: nil}}',
          )
          browser_test.write_text(text)

          probe_store = Path('internal/networkevidence/probe_store.go')
          text = probe_store.read_text().replace(
              'store := &ProbeStore{path: path}\n\tif _, exists, err := store.Get(); err != nil || !exists {\n\t\treturn store, err\n\t}\n\treturn store, nil',
              'store := &ProbeStore{path: path}\n\tif _, exists, err := store.Get(); err != nil {\n\t\treturn nil, err\n\t} else if !exists {\n\t\treturn store, nil\n\t}\n\treturn store, nil',
              1,
          )
          probe_store.write_text(text)

          desktop = Path('internal/desktop/network_evidence.go')
          text = desktop.read_text()
          text = text.replace(
              '\tentries := make([]networkevidence.CompatibilityEntry, 0, len(runs)*3)\n\tfor _, run := range runs {',
              '\tentries := make([]networkevidence.CompatibilityEntry, 0, len(runs)*3)\n\tseen := make(map[string]struct{}, len(runs)*3)\n\tfor _, run := range runs {',
              1,
          )
          text = text.replace(
              '\t\t\tentry := compatibilityEntryForRun(run, capabilities.TrustStatus, capabilityID)\n\t\t\tentries = append(entries, entry)',
              '\t\t\tentry := compatibilityEntryForRun(run, capabilities.TrustStatus, capabilityID)\n\t\t\tkey := fmt.Sprintf("%s|%d|%s|%s|%s|%s|%s", entry.ProviderID, entry.ProviderRevision, entry.BrowserVersion, entry.OperatingSystem, entry.Architecture, entry.BinaryIdentityDigest, entry.CapabilityID)\n\t\t\tif _, exists := seen[key]; exists {\n\t\t\t\tcontinue\n\t\t\t}\n\t\t\tseen[key] = struct{}{}\n\t\t\tentries = append(entries, entry)',
              1,
          )
          desktop.write_text(text)

          service = Path('internal/desktop/service.go')
          service.write_text(service.read_text().replace('const AppVersion = "0.14.0-dev"', 'const AppVersion = "0.15.0-dev"', 1))
          PY
          gofmt -w internal/networkevidence internal/desktop/network_evidence.go internal/desktop/service.go desktop_network_evidence.go desktop_evidence.go internal/desktop/proxy_bridge.go
      - name: Run Go tests
        shell: bash
        run: go test ./cmd/... ./internal/... 2>&1 | tee m4-4-go-test.log
      - name: Check frontend
        working-directory: frontend
        shell: bash
        run: |
          set -o pipefail
          npm install --no-audit --no-fund
          npm run typecheck 2>&1 | tee ../m4-4-frontend.log
          npm test 2>&1 | tee -a ../m4-4-frontend.log
          npm run build 2>&1 | tee -a ../m4-4-frontend.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-4-code-autofix-diagnostics
          path: |
            internal/networkevidence
            internal/desktop/network_evidence.go
            internal/desktop/service.go
            desktop_network_evidence.go
            desktop_evidence.go
            internal/desktop/proxy_bridge.go
            m4-4-go-test.log
            m4-4-frontend.log
          retention-days: 1
          if-no-files-found: warn
      - name: Commit verified code fixes
        if: github.event_name == 'push'
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add internal/networkevidence internal/desktop/network_evidence.go internal/desktop/service.go desktop_network_evidence.go desktop_evidence.go internal/desktop/proxy_bridge.go
          git commit -m 'fix: finalize M4.4 network evidence integration'
          git push origin HEAD:agent/m4-4-network-evidence
