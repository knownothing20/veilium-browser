name: M4 Format Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: List unformatted Go files
        shell: bash
        run: |
          set +e
          gofmt -l . | tee gofmt-files.log
          test ! -s gofmt-files.log
      - name: Upload format diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-gofmt-files
          path: gofmt-files.log
          retention-days: 1
          if-no-files-found: error
