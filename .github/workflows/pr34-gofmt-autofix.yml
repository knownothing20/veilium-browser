name: Temporary PR 34 Go format autofix

on:
  push:
    branches:
      - agent/reviewed-official-chromium-provider

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: agent/reviewed-official-chromium-provider
          fetch-depth: 0

      - name: Format reviewed Provider Go files and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          gofmt -w \
            desktop_app.go \
            internal/desktop/kernel_installer_test.go \
            internal/desktop/kernel_pin_test.go \
            internal/desktop/service.go \
            internal/fingerprint/catalog.go \
            internal/fingerprint/official.go \
            internal/fingerprint/official_test.go \
            internal/kernel/identity.go \
            internal/kernel/identity_test.go \
            internal/kernel/package.go \
            internal/kernel/package_test.go \
            internal/kernel/store.go \
            internal/kernelinstaller/installer.go \
            internal/kernelinstaller/installer_test.go \
            internal/kernelinstaller/official_install_ci_test.go \
            internal/kernelinstaller/official_tamper_ci_test.go \
            internal/kernelrelease/catalog.go \
            internal/kernelrelease/catalog_test.go
          git rm .github/workflows/pr34-gofmt-autofix.yml
          git add desktop_app.go internal
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "chore: format reviewed Provider implementation"
          git push origin HEAD:agent/reviewed-official-chromium-provider
