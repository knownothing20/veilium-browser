name: Temporary gofmt repair

on:
  push:
    branches: [agent/m5-2-safe-local-recovery]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/m5-2-safe-local-recovery
          fetch-depth: 0

      - name: Format Stage 5 Go files
        run: gofmt -w desktop_app_local_recovery.go internal/desktop/local_recovery_service.go

      - name: Commit formatting only
        shell: bash
        run: |
          set -e
          git diff --check
          if git diff --quiet; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add desktop_app_local_recovery.go internal/desktop/local_recovery_service.go
          git commit -m 'style: apply gofmt to Stage 5 bindings'
          git push origin HEAD:agent/m5-2-safe-local-recovery
