name: Reviewed Chromium Snapshot Discovery

on:
  push:
    branches: [agent/reviewed-official-chromium-provider]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  discover-windows-x64:
    if: github.ref_name == 'agent/reviewed-official-chromium-provider' || github.head_ref == 'agent/reviewed-official-chromium-provider'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reviewed-official-chromium-provider
      - name: Discover and inspect one official snapshot
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bucket = 'https://commondatastorage.googleapis.com/chromium-browser-snapshots/Win_x64'
          $revision = (Invoke-RestMethod -Uri "$bucket/LAST_CHANGE").ToString().Trim()
          if ($revision -notmatch '^\d+$') { throw "Unexpected LAST_CHANGE value: $revision" }

          $archiveUrl = "$bucket/$revision/chrome-win.zip"
          $archivePath = Join-Path $env:RUNNER_TEMP 'chrome-win.zip'
          $extractRoot = Join-Path $env:RUNNER_TEMP 'chromium-snapshot'
          Invoke-WebRequest -Uri $archiveUrl -OutFile $archivePath -MaximumRedirection 3

          $archive = Get-Item $archivePath
          if ($archive.Length -lt 50MB -or $archive.Length -gt 500MB) { throw "Unexpected archive size: $($archive.Length)" }
          $archiveHash = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLowerInvariant()

          Expand-Archive -LiteralPath $archivePath -DestinationPath $extractRoot
          $chrome = Get-ChildItem -Path $extractRoot -Filter chrome.exe -File -Recurse | Select-Object -First 1
          if (-not $chrome) { throw 'chrome.exe was not found in the official snapshot archive' }
          $relativeExecutable = [IO.Path]::GetRelativePath($extractRoot, $chrome.FullName).Replace('\','/')
          if ($relativeExecutable -ne 'chrome-win/chrome.exe') { throw "Unexpected executable path: $relativeExecutable" }

          $executable = Get-Item $chrome.FullName
          $rawVersion = if ($executable.VersionInfo.ProductVersion) { $executable.VersionInfo.ProductVersion } else { $executable.VersionInfo.FileVersion }
          if ($rawVersion -notmatch '(\d+\.\d+\.\d+\.\d+)') { throw "Unable to read Chromium PE version: $rawVersion" }
          $browserVersion = $Matches[1]
          $executableHash = (Get-FileHash -Algorithm SHA256 $chrome.FullName).Hash.ToLowerInvariant()

          $entries = Get-ChildItem -Path $extractRoot -Recurse -File | ForEach-Object {
            [IO.Path]::GetRelativePath($extractRoot, $_.FullName).Replace('\','/')
          } | Sort-Object
          if ($entries.Count -gt 5000) { throw "Unexpected archive entry count: $($entries.Count)" }

          $licenseFiles = $entries | Where-Object { $_ -match '(?i)(^|/)(license|copyright|credits|notice)(\.|$)' }
          $result = [ordered]@{
            schemaVersion = 1
            discoveredAt = (Get-Date).ToUniversalTime().ToString('o')
            sourceClass = 'official-chromium-snapshot'
            platform = 'windows'
            architecture = 'amd64'
            revision = [int64]$revision
            archiveUrl = $archiveUrl
            archiveSize = [int64]$archive.Length
            archiveSha256 = $archiveHash
            executablePath = $relativeExecutable
            executableSize = [int64]$executable.Length
            executableSha256 = $executableHash
            browserVersion = $browserVersion
            entryCount = $entries.Count
            licenseFiles = @($licenseFiles)
            topLevelEntries = @($entries | Select-Object -First 200)
            discoveryOnly = $true
            binaryExecutedDuringDiscovery = $false
            normalRuntimeLatestLookupAllowed = $false
          }
          $result | ConvertTo-Json -Depth 6 | Set-Content -Encoding utf8 reviewed-chromium-candidate.json
          $result | ConvertTo-Json -Depth 6
      - name: Upload candidate identity
        uses: actions/upload-artifact@v4
        with:
          name: reviewed-chromium-candidate
          path: reviewed-chromium-candidate.json
          retention-days: 1
          if-no-files-found: error
