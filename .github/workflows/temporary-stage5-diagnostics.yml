name: Temporary Stage 5 diagnostics

on:
  push:
    branches: [agent/m5-2-safe-local-recovery]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m5-2-safe-local-recovery
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Capture Stage 5 diagnostics
        shell: bash
        run: |
          set +e
          {
            echo '## go vet'
            go vet ./cmd/... ./internal/...
            echo "vet_status=$?"
            echo
            echo '## desktop local recovery tests'
            go test -v -run '^TestDesktopLocalRecovery' ./internal/desktop
            echo "test_status=$?"
          } > stage5-diagnostics.txt 2>&1
          cat stage5-diagnostics.txt
      - name: Commit diagnostics
        shell: bash
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add stage5-diagnostics.txt
          git commit -m 'chore: capture Stage 5 diagnostics'
          git push origin HEAD:agent/m5-2-safe-local-recovery
