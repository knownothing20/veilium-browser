name: Temporary Stage 5 diagnostics

on:
  push:
    branches: [agent/m5-2-safe-local-recovery]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Vet Stage 5 packages
        continue-on-error: true
        run: go vet ./internal/desktop ./...
      - name: Test desktop local recovery
        run: go test -v -run '^TestDesktopLocalRecovery' ./internal/desktop
