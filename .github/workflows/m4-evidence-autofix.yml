name: M4 Evidence Autofix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  autofix:
    if: github.head_ref == 'agent/m4-2-real-browser-evidence'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Apply audited manager lifecycle fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('internal/evidence/manager.go')
          text = path.read_text()

          if 'collectorClosed := false' not in text:
              text = text.replace(
                  'targetOpened := false\n\tcleanupLimitations := make([]string, 0, 2)',
                  'targetOpened := false\n\tcollectorClosed := false\n\tcleanupLimitations := make([]string, 0, 2)',
                  1,
              )
              text = text.replace(
                  '\t\t_ = collector.Close(cleanupContext)\n\t}()',
                  '\t\tif !collectorClosed {\n\t\t\t_ = collector.Close(cleanupContext)\n\t\t}\n\t}()',
                  1,
              )
              text = text.replace(
                  '\t\tcloseCollectorWithLimitation(collector, &cleanupLimitations)\n\t\treturn m.persistFailureWithLimitations',
                  '\t\tcloseCollectorWithLimitation(collector, &cleanupLimitations)\n\t\tcollectorClosed = true\n\t\treturn m.persistFailureWithLimitations',
                  1,
              )
              text = text.replace(
                  '\tif err := collector.Close(cleanupContext); err != nil {\n\t\tcleanupLimitations = append(cleanupLimitations, "collector-close-failed:"+boundedError(err))\n\t}\n\tcleanupCancel()',
                  '\tif err := collector.Close(cleanupContext); err != nil {\n\t\tcleanupLimitations = append(cleanupLimitations, "collector-close-failed:"+boundedError(err))\n\t}\n\tcollectorClosed = true\n\tcleanupCancel()',
                  1,
              )

          if 'func (m *Manager) Shutdown()' not in text:
              marker = 'func (m *Manager) Cancel(profileID string) error {'
              shutdown = '''func (m *Manager) Shutdown() {
          \tm.mu.Lock()
          \tcancels := make([]context.CancelFunc, 0, len(m.active))
          \tfor _, cancel := range m.active {
          \t\tcancels = append(cancels, cancel)
          \t}
          \tm.mu.Unlock()
          \tfor _, cancel := range cancels {
          \t\tcancel()
          \t}
          }

          '''
              if marker not in text:
                  raise SystemExit('manager Cancel marker not found')
              text = text.replace(marker, shutdown + marker, 1)

          path.write_text(text)
          PY
      - name: Format audited Go files
        shell: bash
        run: |
          gofmt -w \
            internal/evidence/manager.go \
            internal/evidence/page.go \
            internal/evidence/payload.go \
            internal/evidence/store_test.go \
            internal/evidence/types.go \
            internal/desktop/evidence.go \
            desktop_evidence.go
      - name: Verify evidence package
        run: go test ./internal/evidence
      - name: Commit scoped fixes
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No autofix changes required.'
            exit 0
          fi
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            internal/evidence/manager.go \
            internal/evidence/page.go \
            internal/evidence/payload.go \
            internal/evidence/store_test.go \
            internal/evidence/types.go \
            internal/desktop/evidence.go \
            desktop_evidence.go
          git commit -m 'fix: complete and format M4 evidence core'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
