name: M4 Linux Evidence Diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/m4-2-real-browser-evidence'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Locate hosted Chromium and inventory policies
        id: chromium
        shell: bash
        run: |
          chromium_path=$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || command -v chromium-browser || true)
          test -n "$chromium_path"
          echo "path=$chromium_path" >> "$GITHUB_OUTPUT"
          "$chromium_path" --version | tee chromium-version.log
          {
            echo 'Managed policy files before isolation:'
            sudo find /etc/chromium/policies /etc/opt/chrome/policies -maxdepth 3 -type f -print 2>/dev/null || true
          } | tee chromium-policy-files.log
      - name: Isolate managed policies
        id: policy
        shell: bash
        run: |
          backup="$RUNNER_TEMP/veilium-chromium-policy-backup"
          mkdir -p "$backup"
          index=0
          for directory in /etc/chromium/policies/managed /etc/opt/chrome/policies/managed; do
            if [ ! -d "$directory" ]; then
              continue
            fi
            while IFS= read -r -d '' policy; do
              index=$((index + 1))
              printf '%s' "$policy" > "$backup/$index.path"
              sudo mv "$policy" "$backup/$index.json"
            done < <(sudo find "$directory" -maxdepth 1 -type f -name '*.json' -print0)
          done
          echo "backup=$backup" >> "$GITHUB_OUTPUT"
          echo "$index" > isolated-policy-count.log
      - name: Run controlled evidence test
        shell: bash
        env:
          VEILIUM_CHROMIUM_BINARY: ${{ steps.chromium.outputs.path }}
        run: |
          set +e
          go test -v -count=1 -run '^TestRealChromiumEvidenceCollector$' ./internal/evidence 2>&1 | tee evidence-linux.log
          status=${PIPESTATUS[0]}
          echo "$status" > evidence-linux.status
          exit 0
      - name: Restore managed policies
        if: always()
        shell: bash
        env:
          POLICY_BACKUP: ${{ steps.policy.outputs.backup }}
        run: |
          if [ -n "$POLICY_BACKUP" ] && [ -d "$POLICY_BACKUP" ]; then
            shopt -s nullglob
            for path_file in "$POLICY_BACKUP"/*.path; do
              original=$(cat "$path_file")
              number=$(basename "$path_file" .path)
              sudo mkdir -p "$(dirname "$original")"
              sudo mv "$POLICY_BACKUP/$number.json" "$original"
            done
            rm -rf "$POLICY_BACKUP"
          fi
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-linux-evidence-diagnostics
          path: |
            chromium-version.log
            chromium-policy-files.log
            isolated-policy-count.log
            evidence-linux.log
            evidence-linux.status
          retention-days: 1
          if-no-files-found: warn
