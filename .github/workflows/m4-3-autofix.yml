name: M4.3 Integration Autofix

on:
  push:
    branches: [agent/m4-3-identity-window-consistency]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  autofix:
    if: github.ref_name == 'agent/m4-3-identity-window-consistency' || github.head_ref == 'agent/m4-3-identity-window-consistency'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-3-identity-window-consistency
          repository: knownothing20/veilium-browser
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Apply audited M4.3 integration edits
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          manager = Path('internal/evidence/manager.go')
          text = manager.read_text()
          if '"github.com/knownothing20/veilium-browser/internal/consistency"' not in text:
              text = text.replace(
                  '"github.com/knownothing20/veilium-browser/internal/domain"',
                  '"github.com/knownothing20/veilium-browser/internal/consistency"\n\t"github.com/knownothing20/veilium-browser/internal/domain"',
                  1,
              )
          digest_block = '''\tconsistencyDigest, err := consistency.InputDigest(consistency.DigestInput{
          \t\tProfile:         request.Profile,
          \t\tCapabilities:    request.Capabilities,
          \t\tBinaryIdentity:  identity,
          \t\tRuntimeOS:       identity.OperatingSystem,
          \t\tRuntimeArch:     identity.Architecture,
          \t\tHarnessRevision: HarnessRevision,
          \t})
          \tif err != nil {
          \t\treturn Run{}, err
          \t}
          '''
          marker = '\trunID, err := NewRunID()'
          if 'consistencyDigest, err :=' not in text:
              if marker not in text:
                  raise SystemExit('evidence run ID marker not found')
              text = text.replace(marker, digest_block + marker, 1)
          if 'ConsistencyInputDigest:' not in text:
              text = text.replace(
                  '\t\tHarnessRevision:  HarnessRevision,\n\t\tStatus:',
                  '\t\tHarnessRevision:          HarnessRevision,\n\t\tConsistencyInputDigest:   consistencyDigest,\n\t\tConsistencyRulesRevision: consistency.RulesRevision,\n\t\tStatus:',
                  1,
              )
          manager.write_text(text)

          service = Path('internal/desktop/service.go')
          text = service.read_text()
          replacements = [
              (
                  '''\tif _, err := fingerprint.Validate(withValidationSeed(input)); err != nil {\n\t\treturn domain.Profile{}, err\n\t}\n\treturn s.store.Create(input)''',
                  '''\tif _, err := fingerprint.Validate(withValidationSeed(input)); err != nil {\n\t\treturn domain.Profile{}, err\n\t}\n\tif err := s.validateProfileConsistency(input); err != nil {\n\t\treturn domain.Profile{}, err\n\t}\n\treturn s.store.Create(input)''',
              ),
              (
                  '''\tif _, err := fingerprint.Validate(withValidationSeed(input)); err != nil {\n\t\treturn domain.Profile{}, err\n\t}\n\treturn s.store.Update(input)''',
                  '''\tif _, err := fingerprint.Validate(withValidationSeed(input)); err != nil {\n\t\treturn domain.Profile{}, err\n\t}\n\tif err := s.validateProfileConsistency(input); err != nil {\n\t\treturn domain.Profile{}, err\n\t}\n\treturn s.store.Update(input)''',
              ),
              (
                  '''\tif err := s.validateProxy(item); err != nil {\n\t\treturn domain.LaunchPlan{}, err\n\t}\n\treturn s.planner.Build(item, request.RemoteDebuggingPort)''',
                  '''\tif err := s.validateProxy(item); err != nil {\n\t\treturn domain.LaunchPlan{}, err\n\t}\n\tif err := s.validateProfileConsistency(item); err != nil {\n\t\treturn domain.LaunchPlan{}, err\n\t}\n\treturn s.planner.Build(item, request.RemoteDebuggingPort)''',
              ),
              (
                  '''\tif err := s.validateProxy(item); err != nil {\n\t\treturn supervisor.Session{}, err\n\t}\n\tmanagedDir := filepath.Join(s.profilesDir, item.ID)''',
                  '''\tif err := s.validateProxy(item); err != nil {\n\t\treturn supervisor.Session{}, err\n\t}\n\tif err := s.validateProfileConsistency(item); err != nil {\n\t\treturn supervisor.Session{}, err\n\t}\n\tmanagedDir := filepath.Join(s.profilesDir, item.ID)''',
              ),
          ]
          for old, new in replacements:
              if new not in text:
                  if old not in text:
                      raise SystemExit('desktop integration marker not found')
                  text = text.replace(old, new, 1)
          service.write_text(text)
          PY
      - name: Format scoped Go files
        run: |
          gofmt -w \
            internal/domain/types.go \
            internal/domain/window.go \
            internal/consistency/*.go \
            internal/evidence/manager.go \
            internal/evidence/types.go \
            internal/desktop/consistency.go \
            internal/desktop/service.go \
            internal/fingerprint/args.go \
            internal/launch/planner.go
      - name: Run scoped tests with diagnostics
        id: tests
        shell: bash
        run: |
          set +e
          go test ./internal/consistency ./internal/evidence ./internal/desktop ./internal/fingerprint ./internal/launch 2>&1 | tee m4-3-tests.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload scoped test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-3-scoped-test-diagnostics
          path: m4-3-tests.log
          retention-days: 1
          if-no-files-found: error
      - name: Commit scoped integration
        if: steps.tests.outputs.status == '0'
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No integration changes required.'
            exit 0
          fi
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add \
            internal/domain/types.go \
            internal/domain/window.go \
            internal/consistency \
            internal/evidence/manager.go \
            internal/evidence/types.go \
            internal/desktop/consistency.go \
            internal/desktop/service.go \
            internal/fingerprint/args.go \
            internal/launch/planner.go
          git commit -m 'feat: integrate M4.3 consistency preflight and freshness'
          git push origin HEAD:agent/m4-3-identity-window-consistency
      - name: Fail after diagnostics
        if: steps.tests.outputs.status != '0'
        run: exit 1
