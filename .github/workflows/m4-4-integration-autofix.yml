name: M4.4 Integration Autofix

on:
  push:
    branches: [agent/m4-4-network-evidence]

permissions:
  contents: write

jobs:
  verify-and-format:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m4-4-network-evidence
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Format scoped Go files
        shell: bash
        run: |
          gofmt -w internal/networkevidence internal/desktop/network_evidence.go internal/desktop/proxy_bridge.go desktop_network_evidence.go desktop_evidence.go
      - name: Run scoped Go tests
        run: go test ./internal/networkevidence ./internal/desktop
      - name: Check frontend
        working-directory: frontend
        run: |
          npm install --no-audit --no-fund
          npm run typecheck
          npm test
          npm run build
      - name: Commit verified formatting
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name 'veilium-governance-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add internal/networkevidence internal/desktop/network_evidence.go internal/desktop/proxy_bridge.go desktop_network_evidence.go desktop_evidence.go
          git commit -m 'style: format M4.4 integration'
          git push origin HEAD:agent/m4-4-network-evidence
