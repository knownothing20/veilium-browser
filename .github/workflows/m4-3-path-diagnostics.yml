name: M4.3 Path Diagnostics

on:
  push:
    branches: [agent/m4-3-identity-window-consistency]

permissions:
  contents: read

jobs:
  paths:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: List M4.3 relevant files
        shell: bash
        run: |
          find internal/domain internal/fingerprint internal/launch internal/supervisor internal/evidence internal/profile frontend/src -maxdepth 2 -type f | sort
